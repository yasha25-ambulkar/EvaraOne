# ============================================================================
# MQTT Broker Security Configuration
# ============================================================================
# CRITICAL FIX #1: MQTT Authentication & TLS Encryption
# Enforces security for device-to-broker communication

# ─── LISTENER CONFIGURATION ───────────────────────────────────────────────
# Default listener on port 1883 (reserved for authenticated clients only)
listener 1883
  protocol mqtt
  allow_anonymous false
  password_file /mosquitto/config/passwd
  acl_file /mosquitto/config/acl.acl
  # No TLS on 1883, but ACL + password required

# Secure listener on port 8883 (MQTTS - MQTT over TLS)
listener 8883
  protocol mqtt
  allow_anonymous false
  password_file /mosquitto/config/passwd
  acl_file /mosquitto/config/acl.acl
  cafile /mosquitto/certs/ca.crt
  certfile /mosquitto/certs/server.crt
  keyfile /mosquitto/certs/server.key
  tls_version tlsv1.2

# WebSocket listener (for browser clients)
listener 9001
  protocol websockets
  allow_anonymous false
  password_file /mosquitto/config/passwd
  acl_file /mosquitto/config/acl.acl
  cafile /mosquitto/certs/ca.crt
  certfile /mosquitto/certs/server.crt
  keyfile /mosquitto/certs/server.key

# ─── SECURITY SETTINGS ────────────────────────────────────────────────────
# Do NOT allow anonymous connections
allow_anonymous false

# Require strong password (no default credentials)
password_file /mosquitto/config/passwd

# ACL file controls which devices can publish/subscribe to topics
acl_file /mosquitto/config/acl.acl

# Reject SUBSCRIBE to $SYS topics (system topics)
sys_interval 0

# Default ACL policy: DENY (whitelist only)
acl_default deny

# ─── TLS CONFIGURATION ────────────────────────────────────────────────────
# Enforce TLS for secure listener
# Certificate must be signed by a trusted CA (Let's Encrypt or self-signed)
# TLS version 1.2+ (no weak SSL 3.0 or TLS 1.0)

# ─── PERFORMANCE AND LIMITS ──────────────────────────────────────────────
# Max concurrent connections per IP (prevent floods)
max_connections -1

# Max connections per client (limit same client reconnecting)
max_queued_messages 1000

# Message size limit (prevent large payload attacks)
message_size_limit 100000  # 100KB max per message

# Keep-alive interval
keepalive_interval 60

# ─── LOGGING ──────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all
log_timestamp true

# ─── PERSISTENCE ──────────────────────────────────────────────────────────
# Save state on disk
persistence true
persistence_file /mosquitto/data/mosquitto.db
persistence_location /mosquitto/data/

# ============================================================================
# DEVICE AUTHENTICATION
# Each physical device gets a username/password pair stored in passwd file
# Example (generate with: mosquitto_passwd -c /mosquitto/config/passwd device_user):
#   device_user:hashed_password
#   device_user_2:hashed_password
# ============================================================================

# ============================================================================
# ACL CONFIGURATION (see acl.acl file)
# Each device can only publish to its own topic and subscribe to commands
# Example:
#   user device_user
#   topic devices/DEVICE_ID/telemetry
#   topic devices/DEVICE_ID/commands
# ============================================================================
