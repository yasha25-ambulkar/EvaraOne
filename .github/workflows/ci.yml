name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  NODE_VERSION: "20"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci --prefix backend
      - name: Run backend tests
        run: npm --prefix backend test -- --runInBand
      - name: Audit backend production dependencies
        run: npm --prefix backend audit --omit=dev --audit-level=high

  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install client dependencies
        run: npm ci --prefix client
      - name: Typecheck client
        run: npm --prefix client run typecheck
      - name: Build client
        run: npm --prefix client run build
      - name: Audit client production dependencies
        run: npm --prefix client audit --omit=dev --audit-level=high

  smoke:
    name: Production smoke check
    runs-on: ubuntu-latest
    needs: [backend, client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.PRODUCTION_URL != ''
    steps:
      - name: Verify deployed health endpoint
        run: curl --fail --silent --show-error "${{ secrets.PRODUCTION_URL }}/api/v1/health"
